# =============================================================================
# AImyChats Homepage Configuration
# Domain: aimychats.com, www.aimychats.com
# Service: devify-home container (VitePress static site with nginx)
# Note: HTTPS/SSL is handled by external Nginx Proxy Manager
# =============================================================================

server {
    listen 80;
    server_name aimychats.com www.aimychats.com;

    # Logging configuration
    access_log /var/log/nginx/aimychats.com.access.log;
    error_log /var/log/nginx/aimychats.com.error.log;

    # Proxy to devify-home container
    location / {
        proxy_pass http://devify-home:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_redirect off;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
}
