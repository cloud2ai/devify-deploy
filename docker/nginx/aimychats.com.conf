# =============================================================================
# AImyChats Homepage Configuration
# Domain: aimychats.com, www.aimychats.com
# Service: devify-home container (VitePress static site with nginx)
# Note: Supports both HTTP and HTTPS
# =============================================================================

# HTTP Server
server {
    listen 80;
    server_name aimychats.com www.aimychats.com;

    # Logging configuration
    access_log /var/log/nginx/aimychats.com.access.log;
    error_log /var/log/nginx/aimychats.com.error.log;

    # Proxy to devify-home container
    location / {
        set $devify_home http://devify-home:80;
        proxy_pass $devify_home;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;

        proxy_redirect off;
        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
}

# HTTPS Server
server {
    listen 443 ssl;
    http2 on;
    server_name aimychats.com www.aimychats.com;

    # SSL Certificate Configuration
    ssl_certificate /etc/nginx/certs/aimychats.com.crt;
    ssl_certificate_key /etc/nginx/certs/aimychats.com.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Logging configuration
    access_log /var/log/nginx/aimychats.com.access.log;
    error_log /var/log/nginx/aimychats.com.error.log;

    # Proxy to devify-home container
    location / {
        set $devify_home http://devify-home:80;
        proxy_pass $devify_home;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $http_host;

        # Rewrite redirects to preserve HTTPS protocol and client port
        proxy_redirect ~^http://([^:/]+)(:\d+)?(.*)$ https://$http_host$3;

        proxy_connect_timeout 30s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }
}
